<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyDMARC — Internship Knowledge Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080f1e;
    --surface: #0f1d35;
    --card: #142040;
    --border: #1e3158;
    --text: #e2eaf6;
    --muted: #5b7aa0;
    --subtle: #2a4270;
    --dkim: #3b82f6;
    --back: #f97316;
    --soc: #a855f7;
    --bimi: #10b981;
    --spf: #f59e0b;
    --mta: #ef4444;
    --tls: #06b6d4;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(59,130,246,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 90%, rgba(6,182,212,0.05) 0%, transparent 60%);
  }

  #app { width: 100%; max-width: 660px; }

  /* ── SCREENS ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── LANDING ── */
  .landing {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 44px 40px;
    text-align: center;
  }

  .eyebrow {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--dkim);
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.25);
    border-radius: 99px;
    padding: 5px 16px;
    margin-bottom: 24px;
  }

  .landing h1 {
    font-family: 'Syne', sans-serif;
    font-size: 34px;
    font-weight: 800;
    line-height: 1.15;
    margin-bottom: 14px;
    color: #fff;
  }

  .landing p {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.65;
    margin-bottom: 28px;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }

  .topic-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
  }

  .topic-pill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    border-radius: 99px;
    padding: 4px 12px;
    letter-spacing: 0.03em;
  }

  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    margin-bottom: 36px;
  }

  .meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  /* ── BUTTONS ── */
  .btn-primary {
    background: var(--dkim);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px 32px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.01em;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .btn-secondary {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 28px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-secondary:hover { background: var(--card); }

  /* ── QUIZ CARD ── */
  .quiz-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 36px 32px;
  }

  .progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .progress-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .progress-track {
    height: 3px;
    background: var(--subtle);
    border-radius: 99px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 18px;
  }

  .topic-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    border-radius: 99px;
    padding: 4px 12px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }

  .type-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 4px 10px;
  }

  .question-text {
    font-size: 17px;
    font-weight: 500;
    line-height: 1.6;
    color: #fff;
    margin-bottom: 24px;
  }

  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
  }

  .option {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 14px;
    line-height: 1.5;
    color: #c4d4eb;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
    text-align: left;
    width: 100%;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .option:hover { border-color: var(--dkim); color: #fff; }
  .option.selected { color: #fff; }

  .option-letter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    opacity: 0.45;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .btn-row {
    display: flex;
    justify-content: flex-end;
  }

  /* ── RESULTS ── */
  .results-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px;
  }

  .score-big {
    font-family: 'Syne', sans-serif;
    font-size: 72px;
    font-weight: 800;
    color: var(--dkim);
    text-align: center;
    line-height: 1;
    margin-bottom: 6px;
  }

  .score-label {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    color: #fff;
    margin-bottom: 8px;
  }

  .score-msg {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 32px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 0 20px;
  }

  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .topic-rows { display: flex; flex-direction: column; gap: 14px; margin-bottom: 32px; }

  .topic-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .topic-name {
    font-size: 12px;
    font-weight: 600;
    min-width: 148px;
    flex-shrink: 0;
  }

  .bar-track {
    flex: 1;
    height: 5px;
    background: var(--subtle);
    border-radius: 99px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }

  .topic-score {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 72px;
    text-align: right;
  }

  .results-btns { display: flex; gap: 12px; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .screen.active { animation: fadeUp 0.25s ease both; }
</style>
</head>
<body>
<div id="app">

  <!-- LANDING -->
  <div id="screen-landing" class="screen active">
    <div class="landing">
      <div class="eyebrow">EasyDMARC · Technical Support</div>
      <h1>Internship Knowledge Quiz</h1>
      <p>50 questions covering the core email security topics you'll work with every day in technical support.</p>
      <div class="topic-grid" id="topic-pills"></div>
      <div class="meta-row">
        <span class="meta">⏱ No time limit</span>
        <span class="meta">🎯 50 Questions</span>
        <span class="meta">📊 MC + True / False</span>
        <span class="meta">🔥 Medium – Hard</span>
      </div>
      <button class="btn-primary" onclick="startQuiz()">Start Quiz →</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-card">
      <div class="progress-row">
        <span class="progress-label" id="q-counter">Question 1 of 50</span>
        <span class="progress-label" id="q-score">0 correct so far</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="q-meta">
        <span class="topic-tag" id="q-topic"></span>
        <span class="type-badge" id="q-type"></span>
      </div>
      <p class="question-text" id="q-text"></p>
      <div class="options-grid" id="q-options"></div>
      <div class="btn-row">
        <button class="btn-primary" id="btn-next" onclick="nextQuestion()" disabled>Next Question →</button>
      </div>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="screen-results" class="screen">
    <div class="results-card">
      <div class="score-big" id="r-pct"></div>
      <div class="score-label" id="r-label"></div>
      <div class="score-msg" id="r-msg"></div>
      <div class="divider"></div>
      <div class="section-label">Score by Topic</div>
      <div class="topic-rows" id="r-topics"></div>
      <div class="results-btns">
        <button class="btn-primary" onclick="retakeQuiz()">Retake Quiz</button>
      </div>
    </div>
  </div>

</div>

<script>
const TOPIC_COLORS = {
  "DKIM Replay Attack": "var(--dkim)",
  "Backscatter Attack": "var(--back)",
  "Social Engineering": "var(--soc)",
  "BIMI":              "var(--bimi)",
  "SPF Sending Sources":"var(--spf)",
  "MTA-STS":           "var(--mta)",
  "TLS-RPT":           "var(--tls)"
};

const TOPIC_COLORS_HEX = {
  "DKIM Replay Attack": "#3b82f6",
  "Backscatter Attack": "#f97316",
  "Social Engineering": "#a855f7",
  "BIMI":              "#10b981",
  "SPF Sending Sources":"#f59e0b",
  "MTA-STS":           "#ef4444",
  "TLS-RPT":           "#06b6d4"
};

const ALL_QUESTIONS = [
  // ── DKIM REPLAY ATTACK ──
  { id:1, topic:"DKIM Replay Attack", type:"mc",
    question:"What is a DKIM replay attack?",
    options:["Forging a DKIM signature by stealing the sender's private key","Taking a legitimately DKIM-signed email and resending it to other recipients without modification","Intercepting an email mid-delivery and altering the DKIM headers","Brute-forcing a DKIM public key to bypass authentication"],
    answer:1, explanation:"A DKIM replay attack reuses a legitimate DKIM-signed email by forwarding it unchanged to new targets. The signature stays valid because the body was never modified." },

  { id:2, topic:"DKIM Replay Attack", type:"tf",
    question:"A DKIM signature becomes invalid if the email is forwarded through a third-party mail relay without any body modifications.",
    answer:false, explanation:"Forwarding does not invalidate a DKIM signature as long as the body remains unchanged. This is exactly what makes replay attacks possible." },

  { id:3, topic:"DKIM Replay Attack", type:"mc",
    question:"In the Google DKIM replay campaign, how did the attacker create a legitimately signed phishing email without access to Google's private key?",
    options:["They registered a domain similar to google.com and signed it themselves","They named an OAuth app with phishing text, triggering a real Google alert email that was already signed by Google","They intercepted a Google email in transit and modified the DKIM signature","They used a compromised Google employee account to send the email"],
    answer:1, explanation:"The attacker created an OAuth app with phishing content in its name. Google's automated alert included that name in a legitimately signed email — no key access needed." },

  { id:4, topic:"DKIM Replay Attack", type:"mc",
    question:"Why do DKIM replay attacks often pass DMARC checks?",
    options:["Because DMARC doesn't check DKIM signatures","Because the replayed email carries a valid DKIM signature that aligns with the From domain","Because DMARC only checks SPF, which passes at the relay","Because DMARC policies are always set to p=none"],
    answer:1, explanation:"DMARC alignment is satisfied by DKIM — the valid signature's domain matches the From header, so DMARC passes even though the email was replayed." },

  { id:5, topic:"DKIM Replay Attack", type:"mc",
    question:"Which of the following best explains why DKIM replay attacks are difficult to detect with traditional email security tools?",
    options:["The email is encrypted end-to-end","The email passes all authentication checks (SPF, DKIM, DMARC) because the signature is genuinely valid","The attack bypasses the MX record entirely","Traditional tools don't inspect DKIM signatures"],
    answer:1, explanation:"Since the DKIM signature is real and valid, traditional tools that rely on authentication results see the email as fully legitimate." },

  { id:6, topic:"DKIM Replay Attack", type:"tf",
    question:"Enforcing DMARC p=reject on your domain would have prevented the Google DKIM replay attack from reaching victims' inboxes.",
    answer:false, explanation:"DMARC p=reject protects your domain from being spoofed. But in a DKIM replay, the email is authenticated by the legitimate sender's domain (Google), so DMARC on another domain wouldn't stop it." },

  { id:7, topic:"DKIM Replay Attack", type:"mc",
    question:"What made the phishing page in the Google DKIM replay attack particularly convincing to recipients?",
    options:["It used an SSL certificate with Google's company name","It was hosted on sites.google.com — a real, legitimate Google-owned domain","It was an exact pixel-copy of accounts.google.com served from a CDN","Google's support team accidentally linked to it"],
    answer:1, explanation:"The page was hosted on sites.google.com — a legitimate Google domain. This made detection very hard, as the domain was genuinely owned by Google." },

  { id:8, topic:"DKIM Replay Attack", type:"mc",
    question:"What is the most effective way to detect DKIM replay attacks?",
    options:["Stricter SPF record configuration","DMARC with p=quarantine policy","Behavioral analysis that detects unusual sender patterns and anomalies beyond authentication results","Checking that DKIM signatures haven't expired"],
    answer:2, explanation:"Since authentication checks pass, detection must rely on behavioral signals — unusual sending patterns, mismatched context, or abnormal content that differs from the sender's typical behavior." },

  { id:9, topic:"DKIM Replay Attack", type:"tf",
    question:"In a DKIM replay attack, the attacker needs to compromise the original sender's mail server.",
    answer:false, explanation:"No server access is needed. The attacker simply needs a copy of a legitimately signed email, which they can obtain by being a recipient or triggering an automated notification." },

  { id:10, topic:"DKIM Replay Attack", type:"mc",
    question:"What fundamental design limitation of DKIM makes replay attacks possible?",
    options:["DKIM uses symmetric encryption which can be reversed","DKIM signatures don't bind the email to a specific recipient or timestamp, so they can be reused indefinitely","DKIM only signs the headers, leaving the body unprotected","DKIM keys are publicly available making forgery trivial"],
    answer:1, explanation:"DKIM signatures are not scoped to a specific recipient or delivery window. A valid signature remains valid forever and can be replayed to anyone." },

  // ── BACKSCATTER ──
  { id:11, topic:"Backscatter Attack", type:"mc",
    question:"What causes backscatter?",
    options:["A misconfigured mail server that bounces all incoming emails","A spammer spoofing a victim's address in the From/Return-Path field, causing NDRs from failed deliveries to go back to the victim","A DKIM signature mismatch that triggers automatic bounce responses","A mail loop between two misconfigured servers"],
    answer:1, explanation:"Spammers put the victim's address in the sender field. When spam delivery fails, the receiving server sends bounce messages (NDRs) to what it thinks is the sender — the victim." },

  { id:12, topic:"Backscatter Attack", type:"mc",
    question:"Which email field does a spammer manipulate to cause backscatter against a victim?",
    options:["The To: header","The Return-Path / envelope sender (MAIL FROM)","The Reply-To header only","The Message-ID header"],
    answer:1, explanation:"The Return-Path (envelope sender / MAIL FROM) is what mail servers use to send bounce messages. By forging this with the victim's address, all NDRs are misdirected to the victim." },

  { id:13, topic:"Backscatter Attack", type:"tf",
    question:"Receiving backscatter emails is proof that your mail account has been compromised.",
    answer:false, explanation:"Backscatter only requires a spammer to use your email address — no account access needed. Your account can be completely secure and you can still receive backscatter." },

  { id:14, topic:"Backscatter Attack", type:"mc",
    question:"A customer contacts support saying they're receiving bounce messages for emails they never sent, to addresses they don't recognize. What is the most likely explanation?",
    options:["Their email server has a mail loop","Their email account was hacked and is actively sending spam","A spammer is using their address in the From/Return-Path field of a spam campaign — classic backscatter","Their DKIM key has been compromised"],
    answer:2, explanation:"This is the classic backscatter scenario. The customer is receiving NDRs from spam they didn't send because a spammer forged their address. The account may not be compromised at all." },

  { id:15, topic:"Backscatter Attack", type:"mc",
    question:"Which configuration best prevents your domain from being abused to generate backscatter against others?",
    options:["Setting SPF to ~all (softfail)","Publishing a DMARC policy with p=reject","Enabling BIMI","Switching to IMAP instead of POP3"],
    answer:1, explanation:"DMARC p=reject tells receiving servers to reject emails that don't pass authentication — preventing spammers from using your domain in the From field to generate backscatter." },

  { id:16, topic:"Backscatter Attack", type:"tf",
    question:"SPF alone is sufficient to stop all backscatter caused by spammers spoofing your domain.",
    answer:false, explanation:"SPF helps, but many servers don't check SPF before generating bounce messages. DMARC (which uses SPF and DKIM results together) is more effective at preventing domain spoofing." },

  { id:17, topic:"Backscatter Attack", type:"mc",
    question:"What is a Non-Delivery Report (NDR) in the context of backscatter?",
    options:["A spam filter report sent to postmasters","An automated bounce message a mail server sends when it cannot deliver an email","A DMARC failure notification sent to the domain owner","A TLS error report from a receiving server"],
    answer:1, explanation:"An NDR is a bounce message generated when email delivery fails. In backscatter, these legitimate NDRs are misdirected to the spoofed address rather than the actual spammer." },

  { id:18, topic:"Backscatter Attack", type:"tf",
    question:"Backscatter is a direct, intentional attack on the victim's mail infrastructure.",
    answer:false, explanation:"Backscatter is collateral damage — the victim receives misdirected bounce messages as a side effect of a spammer using their address. It is not directly targeted at the victim's infrastructure." },

  // ── SOCIAL ENGINEERING ──
  { id:19, topic:"Social Engineering", type:"mc",
    question:"What is the key difference between phishing and spear phishing?",
    options:["Phishing uses email; spear phishing uses SMS","Phishing is sent broadly to many targets; spear phishing is highly targeted and personalized to a specific individual","Spear phishing always involves malware; phishing does not","Phishing targets credentials; spear phishing targets financial transfers"],
    answer:1, explanation:"Phishing is a mass campaign with generic messages. Spear phishing uses personal details (name, role, colleagues) to craft a convincing, targeted attack." },

  { id:20, topic:"Social Engineering", type:"mc",
    question:"What is whaling?",
    options:["A phishing attack using large email attachments","A spear phishing attack targeting high-level executives such as CEOs or CFOs","A DDoS attack on a company's mail server","Mass phishing targeting an entire organization"],
    answer:1, explanation:"Whaling is spear phishing aimed at 'big fish' — senior executives with financial authority and access to sensitive data. The high payoff justifies the extra research effort." },

  { id:21, topic:"Social Engineering", type:"tf",
    question:"Business Email Compromise (BEC) attacks typically rely on malware or malicious links to succeed.",
    answer:false, explanation:"BEC is purely social engineering — the attacker impersonates an executive and manipulates employees into transferring money or sharing data. No malware or malicious links are required." },

  { id:22, topic:"Social Engineering", type:"mc",
    question:"An attacker calls an employee, claims to be from IT support, and asks for their password to 'fix a login issue'. What type of attack is this?",
    options:["Smishing","Vishing combined with pretexting","Baiting","Tailgating"],
    answer:1, explanation:"This is vishing (voice phishing by phone) combined with pretexting (a fabricated IT support scenario). Both techniques work together to extract the credential." },

  { id:23, topic:"Social Engineering", type:"mc",
    question:"What is smishing?",
    options:["Phishing carried out via SMS text messages","A physical attack where an attacker enters a building by following an employee","Sending spoofed emails from a mobile device","Impersonating a support agent over email"],
    answer:0, explanation:"Smishing is phishing via SMS. Attackers send text messages with malicious links or requests, exploiting the trust many users place in text messages." },

  { id:24, topic:"Social Engineering", type:"mc",
    question:"What is pretexting?",
    options:["Sending phishing emails before a scheduled meeting to lower the target's guard","Creating a fabricated scenario or false identity to manipulate someone into sharing sensitive information","Intercepting communications to read them before the target does","Impersonating a domain in email headers"],
    answer:1, explanation:"Pretexting involves building a believable false narrative — impersonating police, auditors, or vendors — to psychologically manipulate the target into compliance." },

  { id:25, topic:"Social Engineering", type:"tf",
    question:"Tailgating (piggybacking) is a physical security attack, not a digital one.",
    answer:true, explanation:"Tailgating is when an unauthorized person gains physical access to a secure area by following an authorized person through a door. It's a physical breach, not a digital attack." },

  { id:26, topic:"Social Engineering", type:"mc",
    question:"What psychological lever do social engineering attacks most commonly exploit?",
    options:["The target's curiosity about technology","The target's sense of urgency, fear, or deference to authority","The target's desire for financial gain","The target's lack of technical knowledge"],
    answer:1, explanation:"Urgency ('act now or your account gets deleted'), fear ('you're under investigation'), and authority ('I'm your CEO') bypass rational thinking and prompt hasty action." },

  { id:27, topic:"Social Engineering", type:"mc",
    question:"An attacker leaves USB drives labeled 'Q3 Bonuses' in the company parking lot. Employees plug them in. What technique is this?",
    options:["Pretexting","Vishing","Baiting","Quid pro quo"],
    answer:2, explanation:"Baiting uses tempting physical items or digital offers — like a USB drive with an enticing label — to trick victims into executing malicious content." },

  { id:28, topic:"Social Engineering", type:"mc",
    question:"A quid pro quo attack involves:",
    options:["An attacker demanding a ransom payment","An attacker offering something (like IT assistance) in exchange for sensitive information","Spoofing a CEO's email to request a wire transfer","Following an employee into a restricted area"],
    answer:1, explanation:"Quid pro quo means 'something for something' — the attacker offers a service (tech support, help) in exchange for credentials or access." },

  // ── BIMI ──
  { id:29, topic:"BIMI", type:"mc",
    question:"What is the primary purpose of BIMI?",
    options:["To encrypt emails between mail servers","To allow brands to display their verified logo in the recipient's inbox next to authenticated emails","To replace DMARC as the main email authentication standard","To block phishing emails that use brand impersonation"],
    answer:1, explanation:"BIMI (Brand Indicators for Message Identification) allows organizations to display their logo in email clients, improving brand recognition and recipient trust for authenticated mail." },

  { id:30, topic:"BIMI", type:"mc",
    question:"What DMARC policy level is required before a domain can implement BIMI?",
    options:["p=none — monitoring mode is sufficient","p=quarantine or p=reject with pct=100","p=quarantine with any pct value","p=reject only — quarantine is not accepted"],
    answer:1, explanation:"BIMI requires DMARC to be at full enforcement — p=quarantine or p=reject — and pct must be 100. A p=none or partial pct policy does not qualify." },

  { id:31, topic:"BIMI", type:"mc",
    question:"What is the main difference between a VMC and a CMC in the context of BIMI?",
    options:["VMC is issued by certificate authorities; CMC is self-signed","VMC requires a registered trademark for the logo; CMC does not require a trademark and allows more logo flexibility","CMC is only available to government organizations; VMC is for commercial entities","VMC works with all mailbox providers; CMC only works with Yahoo"],

// ── STATE ──
let shuffled = [];
let current  = 0;
let score    = 0;
let results  = [];
let selected = null;

// ── HELPERS ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function topicColor(t) { return TOPIC_COLORS_HEX[t] || '#6366f1'; }

// ── INIT LANDING ──
(function initLanding() {
  const grid = document.getElementById('topic-pills');
  Object.entries(TOPIC_COLORS_HEX).forEach(([t, c]) => {
    const s = document.createElement('span');
    s.className = 'topic-pill';
    s.textContent = t;
    s.style.background = c + '20';
    s.style.color = c;
    s.style.border = `1px solid ${c}40`;
    grid.appendChild(s);
  });
})();

// ── START ──
function startQuiz() {
  shuffled = shuffle(ALL_QUESTIONS);
  current = 0; score = 0; results = []; selected = null;
  renderQuestion();
  showScreen('quiz');
}

function retakeQuiz() {
  startQuiz();
}

// ── RENDER QUESTION ──
function renderQuestion() {
  const q = shuffled[current];
  const c = topicColor(q.topic);
  const pct = (current / shuffled.length) * 100;

  document.getElementById('q-counter').textContent = `Question ${current + 1} of ${shuffled.length}`;
  document.getElementById('q-score').textContent    = `${score} correct so far`;

  const fill = document.getElementById('progress-fill');
  fill.style.width = pct + '%';
  fill.style.background = c;

  const tag = document.getElementById('q-topic');
  tag.textContent = q.topic;
  tag.style.background = c + '20';
  tag.style.color = c;
  tag.style.border = `1px solid ${c}40`;

  document.getElementById('q-type').textContent = q.type === 'tf' ? 'True / False' : 'Multiple Choice';
  document.getElementById('q-text').textContent = q.question;

  const optCont = document.getElementById('q-options');
  optCont.innerHTML = '';

  const opts = q.type === 'tf' ? ['True', 'False'] : q.options;
  opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.dataset.i = i;
    if (q.type !== 'tf') {
      const letter = document.createElement('span');
      letter.className = 'option-letter';
      letter.textContent = String.fromCharCode(65 + i) + '.';
      btn.appendChild(letter);
    }
    const text = document.createElement('span');
    text.textContent = opt;
    btn.appendChild(text);
    btn.onclick = () => selectOption(i, c);
    optCont.appendChild(btn);
  });

  const nextBtn = document.getElementById('btn-next');
  nextBtn.disabled = true;
  nextBtn.textContent = current + 1 >= shuffled.length ? 'See Results →' : 'Next Question →';
  nextBtn.style.background = c;

  selected = null;
}

function selectOption(i, c) {
  selected = i;
  document.querySelectorAll('.option').forEach((btn, idx) => {
    const color = topicColor(shuffled[current].topic);
    if (idx === i) {
      btn.style.borderColor = color;
      btn.style.background  = color + '18';
      btn.style.color = '#fff';
    } else {
      btn.style.borderColor = 'var(--border)';
      btn.style.background  = 'var(--surface)';
      btn.style.color = '#c4d4eb';
    }
  });
  document.getElementById('btn-next').disabled = false;
}

function nextQuestion() {
  if (selected === null) return;
  const q = shuffled[current];
  let correct;
  if (q.type === 'tf') {
    correct = (selected === 0) === q.answer;
  } else {
    correct = selected === q.answer;
  }
  if (correct) score++;
  results.push({ topic: q.topic, correct });
  current++;
  if (current >= shuffled.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

// ── RESULTS ──
function showResults() {
  const pct = Math.round((score / shuffled.length) * 100);
  document.getElementById('r-pct').textContent   = pct + '%';
  document.getElementById('r-label').textContent = `${score} / ${shuffled.length} correct`;
  document.getElementById('r-msg').textContent =
    pct >= 85 ? '🏆 Excellent work — you're well prepared.' :
    pct >= 70 ? '👍 Good effort — review the weaker topics below.' :
                '📚 Keep studying — focus on the highlighted areas.';

  const byTopic = {};
  Object.keys(TOPIC_COLORS_HEX).forEach(t => { byTopic[t] = { correct: 0, total: 0 }; });
  results.forEach(r => {
    byTopic[r.topic].total++;
    if (r.correct) byTopic[r.topic].correct++;
  });

  const container = document.getElementById('r-topics');
  container.innerHTML = '';
  Object.entries(TOPIC_COLORS_HEX).forEach(([t, c]) => {
    const v  = byTopic[t];
    const tp = v.total > 0 ? Math.round((v.correct / v.total) * 100) : 0;
    const row = document.createElement('div');
    row.className = 'topic-row';
    row.innerHTML = `
      <span class="topic-name" style="color:${c}">${t}</span>
      <div class="bar-track">
        <div class="bar-fill" style="width:0%;background:${c}" data-pct="${tp}"></div>
      </div>
      <span class="topic-score">${v.correct}/${v.total} (${tp}%)</span>`;
    container.appendChild(row);
  });

  showScreen('results');

  // Animate bars after paint
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.querySelectorAll('.bar-fill').forEach(b => {
        b.style.width = b.dataset.pct + '%';
      });
    });
  });
}
</script>
